[workspace]
name = "voice-chatbot"
channels = ["robostack-humble", "conda-forge"]
platforms = ["win-64", "linux-64"]
description = "Local voice chatbot with GUI, CLI, and optional ROS 2 integration."
readme = "README.md"
requires-pixi = ">=0.40"

[dependencies]
python = "3.11.*"
pip = "*"
cmake = "*"
git = "*"
ninja = "*"
colcon-common-extensions = "*"
setuptools = ">=69.5,<80"
ros-humble-desktop = "*"
pytest = "*"
pytest-cov = "*"

[tasks]
ensure-setuptools-compat = "python tools/ensure_setuptools_compat.py"
app = "python -m voice_chatbot.app"
ros-app = "python -m voice_chatbot.ros_app"
chatbot = "python -m voice_chatbot.chatbot"
setup-models = "python -m voice_chatbot.setup_models"
test = "pytest"
build = { cmd = "colcon build --symlink-install --packages-select voice_chatbot_ros", depends-on = ["ensure-setuptools-compat"] }

[target.win-64.tasks]
install-python-deps = "cmd /d /c tools\\install_python_windows.bat"
ros-node = { cmd = "cmd /d /c tools\\ros_run_pixi.bat", depends-on = ["build"] }
ros-run = { cmd = "cmd /d /c tools\\ros_run_pixi.bat", depends-on = ["build"] }
ros-launch = { cmd = "cmd /d /c tools\\ros_launch_pixi.bat", depends-on = ["build"] }
ros-start = "cmd /d /c tools\\ros_start_all.bat"
ros-stt = "cmd /d /c tools\\ros_run_node_pixi.bat voice_stt_node"
ros-llm = "cmd /d /c tools\\ros_run_node_pixi.bat voice_llm_node"
ros-tts = "cmd /d /c tools\\ros_run_node_pixi.bat voice_tts_node"

[target.linux-64.tasks]
install-python-deps = "bash tools/install_python_linux.sh"
ros-node = { cmd = "bash tools/ros_run_pixi.sh", depends-on = ["build"] }
ros-run = { cmd = "bash tools/ros_run_pixi.sh", depends-on = ["build"] }
ros-launch = { cmd = "bash tools/ros_launch_pixi.sh", depends-on = ["build"] }
ros-start = "bash tools/ros_start_all.sh"
ros-stt = "bash tools/ros_run_node_pixi.sh voice_stt_node"
ros-llm = "bash tools/ros_run_node_pixi.sh voice_llm_node"
ros-tts = "bash tools/ros_run_node_pixi.sh voice_tts_node"
