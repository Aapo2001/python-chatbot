[workspace]
name = "voice-chatbot"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]
description = "Local speech-to-speech voice assistant with PySide6 GUI and CLI."
readme = "README.md"
requires-pixi = ">=0.40"

[dependencies]
python = "3.11.*"
pip = "*"

[tasks]
app = "python -m voice_chatbot.app"
chatbot = "python -m voice_chatbot.chatbot"
setup-models = "python -m voice_chatbot.setup_models"
test = "python -m pytest"

[pypi-dependencies]
pytest = ">=9,<10"

[target.win-64.tasks]
install-python-deps = "cmd /d /c tools\\install_python_windows.bat"

[target.linux-64.dependencies]
alsa-lib = "*"

[target.linux-64.tasks]
install-python-deps = "bash tools/install_python_linux.sh"
